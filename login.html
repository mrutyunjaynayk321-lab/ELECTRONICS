<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - SwiftCart</title>
    <link rel="stylesheet" href="assets/vendors/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/swiftcart.css" />
</head>
<body>
    <div class="container pt-80 pb-85">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="checkbox-form text-center">
                    <h3 class="mb-30">Login to SwiftCart</h3>
                    <div class="checkout-form-list">
                        <input type="email" id="login-email" placeholder="Email Address">
                    </div>
                    <div class="checkout-form-list mt-3">
                        <input type="password" id="login-password" placeholder="Password">
                    </div>
                    <div class="mt-4">
                        <button id="login-btn" class="cart-checkout-btn w-100">Login</button>
                    </div>
                    <div class="mt-3">
                        <button id="google-login-btn" class="cart-checkout-btn w-100 bg-danger border-0">Sign in with Google</button>
                    </div>
                    <div class="mt-3">
                        <a href="register.html">Don't have an account? Register</a>
                    </div>
                    <div class="mt-2">
                        <button id="guest-btn" class="btn btn-link">Checkout as Guest</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../dist/index.js"></script>
</body>
</html>
