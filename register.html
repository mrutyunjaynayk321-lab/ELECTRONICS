<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - SwiftCart</title>
    <link rel="stylesheet" href="assets/vendors/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/swiftcart.css" />
</head>
<body>
    <div class="container pt-80 pb-85">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="checkbox-form text-center">
                    <h3 class="mb-30">Register for SwiftCart</h3>
                    <div class="checkout-form-list">
                        <input type="text" id="reg-firstname" placeholder="First Name">
                    </div>
                    <div class="checkout-form-list mt-3">
                        <input type="text" id="reg-lastname" placeholder="Last Name">
                    </div>
                    <div class="checkout-form-list mt-3">
                        <input type="email" id="reg-email" placeholder="Email Address">
                    </div>
                    <div class="checkout-form-list mt-3">
                        <input type="tel" id="reg-phone" placeholder="Phone Number">
                    </div>
                    <div class="checkout-form-list mt-3">
                        <input type="password" id="reg-password" placeholder="Password">
                    </div>
                    <div class="mt-4">
                        <button id="register-btn" class="cart-checkout-btn w-100">Register</button>
                    </div>
                    <div class="mt-3">
                        <a href="login.html">Already have an account? Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../dist/index.js"></script>
</body>
</html>
